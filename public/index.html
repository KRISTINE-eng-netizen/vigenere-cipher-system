<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vigenère Cipher System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #161922;
    --surface2: #1e2330;
    --border:   #2a3042;
    --accent:   #4fffb0;
    --accent2:  #00c9ff;
    --danger:   #ff5f6d;
    --text:     #e8eaf2;
    --muted:    #7880a0;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
    --radius:   12px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Ambient background glow ── */
  body::before, body::after {
    content: '';
    position: fixed;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.14;
    z-index: 0;
    pointer-events: none;
    animation: drift 18s ease-in-out infinite alternate;
  }
  body::before {
    background: var(--accent);
    top: -160px;
    left: -160px;
  }
  body::after {
    background: var(--accent2);
    bottom: -160px;
    right: -160px;
    animation-delay: -9s;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.15); }
  }

  /* faint grid texture */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, #000 40%, transparent 90%);
  }

  header, .container { position: relative; z-index: 1; }

  /* ── Entrance animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  header { animation: fadeUp 0.6s cubic-bezier(.2,.8,.2,1) both; }
  .alpha-ref     { animation: fadeUp 0.6s cubic-bezier(.2,.8,.2,1) 0.08s both; }
  .mode-toggle   { animation: fadeUp 0.6s cubic-bezier(.2,.8,.2,1) 0.15s both; }
  .card          { animation: fadeUp 0.6s cubic-bezier(.2,.8,.2,1) 0.22s both; }
  .history-section { animation: fadeUp 0.6s cubic-bezier(.2,.8,.2,1) 0.3s both; }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    opacity: 0.85;
    transition: box-shadow 0.3s, opacity 0.3s;
    animation: badgePulse 3.2s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 rgba(79,255,176,0); }
    50%      { box-shadow: 0 0 14px rgba(79,255,176,0.35); }
  }
  header h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 45%, var(--accent) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 10px;
    animation: sheen 6s linear infinite;
  }
  @keyframes sheen {
    to { background-position: 200% center; }
  }
  header p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* ── Main Layout ── */
  .container { width: 100%; max-width: 820px; }

  /* ── Mode Toggle ── */
  .mode-toggle {
    display: flex;
    background: rgba(22, 25, 34, 0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 28px;
    position: relative;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
  }
  .mode-toggle::before {
    content: '';
    position: absolute;
    top: 4px; bottom: 4px;
    width: calc(50% - 4px);
    background: var(--surface2);
    border-radius: 9px;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px transparent;
    transition: transform 0.32s cubic-bezier(.2,.8,.2,1), box-shadow 0.32s;
  }
  .mode-toggle.decrypt::before {
    transform: translateX(100%);
    box-shadow: 0 0 16px rgba(0,201,255,0.18);
  }
  .mode-toggle:not(.decrypt)::before {
    box-shadow: 0 0 16px rgba(79,255,176,0.18);
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: color 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .mode-btn.active { color: var(--text); }
  .mode-btn svg { width: 18px; height: 18px; transition: transform 0.25s; }
  .mode-btn:hover svg { transform: scale(1.1); }

  /* ── Card ── */
  .card {
    background: rgba(22, 25, 34, 0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 24px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px -12px rgba(0,0,0,0.4);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover {
    border-color: #343b52;
    box-shadow: 0 8px 30px -12px rgba(0,0,0,0.5);
  }

  /* ── Label + Field ── */
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .field label span {
    color: var(--accent);
    font-size: 10px;
    margin-left: 8px;
    letter-spacing: 0;
    text-transform: none;
    font-family: var(--sans);
  }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.25s;
    resize: vertical;
  }
  textarea { min-height: 120px; line-height: 1.6; }
  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,255,176,0.1);
  }

  /* Key field with visual indicator */
  .key-wrap { position: relative; }
  .key-wrap input { padding-right: 140px; }
  .key-viz {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 3px;
  }
  .key-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: scale(0.3);
  }
  .key-dot.active {
    opacity: 1;
    transform: scale(1);
    animation: dotPop 0.35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes dotPop {
    0%   { transform: scale(0.3); }
    60%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* ── Run Button ── */
  .run-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0d0f14;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }
  .run-btn:hover { opacity: 0.92; box-shadow: 0 6px 24px -8px rgba(79,255,176,0.5); transform: translateY(-1px); }
  .run-btn:active { transform: scale(0.98) translateY(0); }
  .run-btn.decrypt-mode { background: var(--accent2); }
  .run-btn.decrypt-mode:hover { box-shadow: 0 6px 24px -8px rgba(0,201,255,0.5); }
  .run-btn svg { width: 18px; height: 18px; transition: transform 0.2s; }
  .run-btn:hover svg { transform: rotate(90deg); }

  /* button ripple */
  .run-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(13,15,20,0.35);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(2.6); opacity: 0; }
  }

  /* ── Result Box ── */
  .result-box {
    margin-top: 24px;
    display: none;
  }
  .result-box.show {
    display: block;
    animation: fadeUp 0.4s cubic-bezier(.2,.8,.2,1) both;
  }
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .result-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .copy-btn svg { width: 14px; height: 14px; }
  .result-text {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    line-height: 1.7;
    word-break: break-all;
    white-space: pre-wrap;
    min-height: 60px;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
    box-shadow: 0 0 20px -6px rgba(79,255,176,0.25);
  }
  .result-text.decrypt-color { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 20px -6px rgba(0,201,255,0.25); }

  /* ── Error ── */
  .error-msg {
    margin-top: 12px;
    padding: 12px 16px;
    background: rgba(255,95,109,0.1);
    border: 1px solid rgba(255,95,109,0.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    display: none;
  }
  .error-msg.show {
    display: block;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(2px); }
  }

  /* ── Alphabet Reference ── */
  .alpha-ref {
    background: rgba(22, 25, 34, 0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px -12px rgba(0,0,0,0.4);
    transition: border-color 0.3s;
  }
  .alpha-ref:hover { border-color: #343b52; }
  .alpha-ref-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .alpha-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .alpha-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 32px;
    border-radius: 6px;
    padding: 2px 0;
    transition: background 0.25s, transform 0.25s;
  }
  .alpha-letter {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    transition: color 0.25s;
  }
  .alpha-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    transition: color 0.25s;
  }
  .alpha-cell.highlighted {
    background: rgba(79,255,176,0.08);
    transform: translateY(-2px);
  }
  .alpha-cell.highlighted .alpha-letter { color: var(--accent); }
  .alpha-cell.highlighted .alpha-num   { color: var(--accent); opacity: 0.7; }

  /* ── History ── */
  .history-section { margin-top: 12px; }
  .history-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); transform: rotate(180deg); }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 60px 1fr 1fr auto;
    gap: 12px;
    align-items: center;
    font-size: 13px;
    animation: fadeUp 0.4s cubic-bezier(.2,.8,.2,1) both;
    transition: border-color 0.25s, transform 0.2s;
  }
  .history-item:hover {
    border-color: var(--border);
    transform: translateX(2px);
  }
  .h-mode {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
  }
  .h-mode.encrypt { background: rgba(79,255,176,0.12); color: var(--accent); }
  .h-mode.decrypt { background: rgba(0,201,255,0.12);  color: var(--accent2); }
  .h-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .h-text strong { color: var(--text); display: block; font-weight: 400; }
  .del-btn {
    background: none;
    border: none;
    color: #3a3f52;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s, transform 0.2s;
  }
  .del-btn:hover { color: var(--danger); transform: scale(1.15); }
  .del-btn svg { width: 16px; height: 16px; }
  .history-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px;
    font-family: var(--mono);
  }

  /* Loading spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0f14;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Flying connected network canvas ── */
  #netCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }

  /* ── Flying letter (on cipher run) ── */
  .fly-letter {
    position: fixed;
    z-index: 999;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    pointer-events: none;
    will-change: transform, opacity;
  }
  .fly-letter.decrypt-color { color: var(--accent2); }

  /* ── Copy success spark burst ── */
  .spark {
    position: fixed;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    pointer-events: none;
    z-index: 999;
    will-change: transform, opacity;
  }

  /* ── Scramble reveal cursor ── */
  .result-text .rvl-cursor {
    display: inline-block;
    width: 7px;
    background: var(--accent);
    margin-left: 1px;
    animation: caretBlink 0.8s step-end infinite;
  }
  .result-text.decrypt-color .rvl-cursor { background: var(--accent2); }
  @keyframes caretBlink { 50% { opacity: 0; } }

  /* ── Custom cursor blob ── */
  .cursor-blob {
    position: fixed;
    top: 0; left: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,255,176,0.55) 0%, rgba(79,255,176,0) 70%);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: background 0.35s ease, width 0.2s ease, height 0.2s ease, opacity 0.3s ease;
    will-change: transform;
  }
  .cursor-blob.visible { opacity: 1; }
  .cursor-blob.decrypt-mode {
    background: radial-gradient(circle, rgba(0,201,255,0.55) 0%, rgba(0,201,255,0) 70%);
  }
  .cursor-blob.grow {
    width: 40px;
    height: 40px;
  }
  @media (hover: none), (pointer: coarse) {
    .cursor-blob { display: none; }
  }

  /* ── Live preview chip ── */
  .live-preview {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
    transition: opacity 0.25s, border-color 0.25s;
  }
  .live-preview.active {
    opacity: 1;
    border-color: var(--accent);
  }
  .live-preview.active.decrypt-mode { border-color: var(--accent2); }
  .lp-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .live-preview.active .lp-dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: lpPulse 1.6s ease-in-out infinite;
  }
  .live-preview.active.decrypt-mode .lp-dot {
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
  }
  @keyframes lpPulse { 50% { opacity: 0.4; } }
  .lp-label {
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 10px;
    flex-shrink: 0;
  }
  .lp-text {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .live-preview.active .lp-text { color: var(--accent); }
  .live-preview.active.decrypt-mode .lp-text { color: var(--accent2); }

  /* ── Cipher wheel decoration ── */
  .cipher-wheel {
    width: 88px;
    height: 88px;
    margin: 4px auto 8px;
    opacity: 0.85;
  }
  .cipher-wheel svg { width: 100%; height: 100%; overflow: visible; }
  .cw-ring {
    fill: none;
    stroke: var(--border);
    stroke-width: 1;
  }
  .cw-ring-outer {
    stroke: var(--accent);
    stroke-opacity: 0.35;
    stroke-dasharray: 2 4;
    transform-origin: 60px 60px;
    animation: cwSpinSlow 24s linear infinite;
  }
  .cw-ring-inner {
    stroke: var(--accent2);
    stroke-opacity: 0.35;
    stroke-dasharray: 3 3;
    transform-origin: 60px 60px;
    animation: cwSpinSlowRev 16s linear infinite;
  }
  .cw-ticks { transform-origin: 60px 60px; animation: cwSpinSlow 40s linear infinite; }
  .cw-ticks-inner { animation: cwSpinSlowRev 28s linear infinite; }
  .cw-ticks line {
    stroke: var(--muted);
    stroke-width: 1;
    opacity: 0.5;
  }
  .cw-hub { fill: var(--accent); }
  .cw-needle {
    stroke: var(--accent2);
    stroke-width: 2;
    stroke-linecap: round;
    transform-origin: 60px 60px;
    animation: cwSpinSlow 9s linear infinite;
    filter: drop-shadow(0 0 4px rgba(0,201,255,0.5));
  }
  @keyframes cwSpinSlow    { to { transform: rotate(360deg); } }
  @keyframes cwSpinSlowRev { to { transform: rotate(-360deg); } }

  .cipher-wheel.spin-fast .cw-ring-outer  { animation-duration: 2.4s; }
  .cipher-wheel.spin-fast .cw-ring-inner  { animation-duration: 1.6s; }
  .cipher-wheel.spin-fast .cw-ticks       { animation-duration: 4s; }
  .cipher-wheel.spin-fast .cw-ticks-inner { animation-duration: 2.8s; }
  .cipher-wheel.spin-fast .cw-needle      { animation-duration: 0.9s; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
<div class="cursor-blob" id="cursorBlob"></div>
<canvas id="netCanvas"></canvas>
<div class="grid-overlay"></div>

<header>
  <div class="badge">Cryptography Tool</div>
  <div class="cipher-wheel" id="cipherWheel" aria-hidden="true">
    <svg viewBox="0 0 120 120">
      <circle class="cw-ring cw-ring-outer" cx="60" cy="60" r="54"/>
      <circle class="cw-ring cw-ring-inner" cx="60" cy="60" r="36"/>
      <g class="cw-ticks" id="cwTicksOuter"></g>
      <g class="cw-ticks cw-ticks-inner" id="cwTicksInner"></g>
      <circle class="cw-hub" cx="60" cy="60" r="5"/>
      <line class="cw-needle" x1="60" y1="60" x2="60" y2="10"/>
    </svg>
  </div>
  <h1>Vigenère Cipher</h1>
  <p>Encrypt and decrypt text using a–z key (index 0–25)</p>
</header>

<div class="container">

  <!-- Alphabet Reference -->
  <div class="alpha-ref">
    <div class="alpha-ref-title">Alphabet Index Reference</div>
    <div class="alpha-grid" id="alphaGrid"></div>
  </div>

  <!-- Mode Toggle -->
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" id="btnEncrypt" onclick="setMode('encrypt')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Encrypt
    </button>
    <button class="mode-btn" id="btnDecrypt" onclick="setMode('decrypt')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/><path d="M17 11V7"/></svg>
      Decrypt
    </button>
  </div>

  <!-- Cipher Card -->
  <div class="card">
    <div class="field">
      <label id="inputLabel"><span id="inputLabelMain">Plaintext</span> <span>letters a–z are shifted by key</span></label>
      <textarea id="inputText" placeholder="Type your text here..." oninput="updateLivePreview()"></textarea>
    </div>

    <div class="field">
      <label>Cipher Key <span>only a–z letters are used</span></label>
      <div class="key-wrap">
        <input type="text" id="keyInput" placeholder="e.g.  secret" oninput="updateKeyViz(); updateLivePreview();" />
        <div class="key-viz" id="keyViz"></div>
      </div>
      <div class="live-preview" id="livePreview">
        <span class="lp-dot"></span>
        <span class="lp-label">Live preview</span>
        <span class="lp-text" id="livePreviewText">start typing…</span>
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runCipher(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M1 12h22"/></svg>
      <span id="runLabel">Encrypt Text</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-header">
        <span class="result-label" id="resultLabel">Encrypted Output</span>
        <button class="copy-btn" onclick="copyResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <!-- History -->
  <div class="card history-section">
    <div class="history-title">
      <span>Recent History (last 20)</span>
      <button class="refresh-btn" onclick="loadHistory()">↻ Refresh</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No history yet — run a cipher above.</div>
    </div>
  </div>

</div>

<script>
let currentMode = 'encrypt';

// ── Alphabet grid ──────────────────────────────────────────
const ALPHA = 'abcdefghijklmnopqrstuvwxyz';
const grid  = document.getElementById('alphaGrid');
ALPHA.split('').forEach((ch, i) => {
  const cell = document.createElement('div');
  cell.className = 'alpha-cell';
  cell.id = 'cell-' + ch;
  cell.innerHTML = `<span class="alpha-letter">${ch.toUpperCase()}</span><span class="alpha-num">${i}</span>`;
  grid.appendChild(cell);
});

function highlightAlpha(key) {
  document.querySelectorAll('.alpha-cell').forEach(c => c.classList.remove('highlighted'));
  const clean = key.toLowerCase().replace(/[^a-z]/g, '');
  [...new Set(clean.split(''))].forEach(ch => {
    const el = document.getElementById('cell-' + ch);
    if (el) el.classList.add('highlighted');
  });
}

// ── Mode switch ────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  const toggle = document.getElementById('modeToggle');
  const runBtn = document.getElementById('runBtn');
  toggle.className = 'mode-toggle ' + mode;
  document.getElementById('btnEncrypt').classList.toggle('active', mode === 'encrypt');
  document.getElementById('btnDecrypt').classList.toggle('active', mode === 'decrypt');
  document.getElementById('inputLabelMain').textContent =
    mode === 'encrypt' ? 'Plaintext' : 'Ciphertext';
  document.querySelector('#inputLabel span:last-child').textContent =
    mode === 'encrypt' ? 'letters a–z are shifted by key' : 'will be reversed using key';
  document.getElementById('runLabel').textContent =
    mode === 'encrypt' ? 'Encrypt Text' : 'Decrypt Text';
  runBtn.className = 'run-btn ' + (mode === 'decrypt' ? 'decrypt-mode' : '');
  document.getElementById('resultLabel').textContent =
    mode === 'encrypt' ? 'Encrypted Output' : 'Decrypted Output';
  document.getElementById('resultText').className =
    'result-text ' + (mode === 'decrypt' ? 'decrypt-color' : '');
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  scrambleToken++; // cancel any in-flight scramble-reveal animation
  updateLivePreview();
  const blob = document.getElementById('cursorBlob');
  if (blob) blob.classList.toggle('decrypt-mode', mode === 'decrypt');
}

// ── Key visualizer ─────────────────────────────────────────
function updateKeyViz() {
  const key = document.getElementById('keyInput').value;
  const clean = key.toLowerCase().replace(/[^a-z]/g, '');
  const viz = document.getElementById('keyViz');
  const MAX = 10;
  viz.innerHTML = '';
  for (let i = 0; i < Math.min(clean.length, MAX); i++) {
    const dot = document.createElement('div');
    dot.className = 'key-dot active';
    dot.style.animationDelay = (i * 0.03) + 's';
    dot.title = clean[i].toUpperCase() + ' (' + ALPHA.indexOf(clean[i]) + ')';
    viz.appendChild(dot);
  }
  highlightAlpha(clean);
}

// ── Button ripple effect ────────────────────────────────────
function spawnRipple(e, btn) {
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

// ── Run cipher ─────────────────────────────────────────────
async function runCipher(e) {
  const runBtn = document.getElementById('runBtn');
  if (e) spawnRipple(e, runBtn);

  const text = document.getElementById('inputText').value.trim();
  const key  = document.getElementById('keyInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  const resBox = document.getElementById('resultBox');
  const spinner = document.getElementById('spinner');

  errEl.classList.remove('show');
  resBox.classList.remove('show');

  if (!text) { showError('Please enter some text.'); return; }
  if (!key)  { showError('Please enter a cipher key.'); return; }

  spinner.classList.add('show');
  runBtn.disabled = true;
  const wheel = document.getElementById('cipherWheel');
  if (wheel) wheel.classList.add('spin-fast');

  try {
    const endpoint = currentMode === 'encrypt' ? '/api/encrypt' : '/api/decrypt';
    const resp = await fetch(endpoint, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text, key })
    });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || 'Server error');

    resBox.classList.remove('show');
    void resBox.offsetWidth; // restart animation
    resBox.classList.add('show');
    revealResult(document.getElementById('resultText'), data.result);
    flyLetters(runBtn, resBox, data.result, currentMode === 'decrypt');
    loadHistory();
  } catch (err) {
    showError(err.message);
  } finally {
    spinner.classList.remove('show');
    runBtn.disabled = false;
    if (wheel) wheel.classList.remove('spin-fast');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.classList.remove('show');
  void el.offsetWidth; // restart shake animation
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

// ── Copy ───────────────────────────────────────────────────
function copyResult() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    sparkBurst(btn);
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`, 1800);
  });
}

// ── History ────────────────────────────────────────────────
async function loadHistory() {
  try {
    const resp = await fetch('/api/history');
    const rows = await resp.json();
    const list = document.getElementById('historyList');

    if (!rows.length) {
      list.innerHTML = '<div class="history-empty">No history yet — run a cipher above.</div>';
      return;
    }

    list.innerHTML = rows.map((r, i) => `
      <div class="history-item" id="hist-${r.id}" style="animation-delay:${Math.min(i * 0.04, 0.4)}s">
        <span class="h-mode ${r.mode}">${r.mode}</span>
        <div class="h-text">
          <strong>${truncate(r.input_text, 30)}</strong>
          key: ${r.cipher_key}
        </div>
        <div class="h-text">
          <strong>${truncate(r.output_text, 30)}</strong>
          ${new Date(r.created_at).toLocaleString()}
        </div>
        <button class="del-btn" onclick="deleteRecord(${r.id})" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    `).join('');
  } catch {
    // server may not be running – silently ignore
  }
}

async function deleteRecord(id) {
  await fetch('/api/history/' + id, { method: 'DELETE' });
  const el = document.getElementById('hist-' + id);
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(12px)'; el.style.transition = 'opacity 0.3s, transform 0.3s'; setTimeout(() => loadHistory(), 300); }
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

// ── Keyboard shortcut: Ctrl+Enter ──────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCipher();
});

// ── Flying connected-particle background ────────────────────
(function initNet() {
  const canvas = document.getElementById('netCanvas');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W, H, particles = [];
  const COUNT = 46;
  const LINK_DIST = 130;
  const COLORS = ['79,255,176', '0,201,255'];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.6 + 1,
      c: COLORS[Math.random() < 0.5 ? 0 : 1]
    };
  }
  for (let i = 0; i < COUNT; i++) particles.push(makeParticle());

  function step() {
    ctx.clearRect(0, 0, W, H);

    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20) p.x = W + 20; if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20; if (p.y > H + 20) p.y = -20;
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINK_DIST) {
          const alpha = (1 - dist / LINK_DIST) * 0.18;
          ctx.strokeStyle = `rgba(${a.c},${alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const p of particles) {
      ctx.beginPath();
      ctx.fillStyle = `rgba(${p.c},0.55)`;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    if (!reduceMotion) requestAnimationFrame(step);
  }
  step();
})();

// ── Flying letters: input → button → result ─────────────────
function flyLetters(sourceEl, targetEl, text, isDecrypt) {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const srcRect = sourceEl.getBoundingClientRect();
  const tgtRect = targetEl.getBoundingClientRect();
  const sample = (text || '').replace(/\s/g, '').split('').slice(0, 10);
  if (!sample.length) return;

  sample.forEach((ch, i) => {
    const el = document.createElement('span');
    el.className = 'fly-letter' + (isDecrypt ? ' decrypt-color' : '');
    el.textContent = ch.toUpperCase();

    const startX = srcRect.left + srcRect.width / 2 + (Math.random() - 0.5) * srcRect.width * 0.6;
    const startY = srcRect.top + srcRect.height / 2;
    const endX = tgtRect.left + 20 + Math.random() * (tgtRect.width - 40);
    const endY = tgtRect.top + tgtRect.height / 2;

    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.opacity = '0';
    document.body.appendChild(el);

    const dx = endX - startX;
    const dy = endY - startY;
    const arc = -60 - Math.random() * 40;
    const delay = i * 45;
    const duration = 650 + Math.random() * 200;

    const anim = el.animate([
      { transform: 'translate(0px, 0px) scale(0.6) rotate(0deg)', opacity: 0 },
      { transform: `translate(${dx * 0.5}px, ${dy * 0.5 + arc}px) scale(1.1) rotate(180deg)`, opacity: 1, offset: 0.55 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.5) rotate(360deg)`, opacity: 0 }
    ], { duration, delay, easing: 'cubic-bezier(.3,.6,.3,1)', fill: 'forwards' });

    anim.onfinish = () => el.remove();
  });
}

// ── Scramble-reveal effect for result text ──────────────────
const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let scrambleToken = 0; // guards against overlapping runs

function revealResult(el, finalText) {
  const myToken = ++scrambleToken;

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches || !finalText) {
    el.textContent = finalText;
    return;
  }

  const chars = finalText.split('');
  const revealed = new Array(chars.length).fill(false);
  let frame = 0;
  const framesPerReveal = 2; // how many ticks before locking in the next char

  function tick() {
    if (myToken !== scrambleToken) return; // a newer run started, stop this one

    let doneCount = 0;
    let display = '';
    for (let i = 0; i < chars.length; i++) {
      if (revealed[i]) {
        display += chars[i];
        doneCount++;
      } else if (chars[i] === '\n' || chars[i] === ' ') {
        display += chars[i];
        revealed[i] = true;
        doneCount++;
      } else {
        display += SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
      }
    }

    el.textContent = display;

    if (doneCount >= chars.length) return; // finished, no cursor left over

    frame++;
    if (frame % framesPerReveal === 0) {
      const revealIndex = Math.floor(doneCount + (chars.length - doneCount) * 0.15) ;
      // reveal characters progressively left-to-right with slight lookahead
      for (let i = 0; i <= revealIndex && i < chars.length; i++) {
        if (Math.random() < 0.4) revealed[i] = true;
      }
      // guarantee forward progress even on unlucky rolls
      const nextUnrevealed = revealed.indexOf(false);
      if (nextUnrevealed !== -1 && frame % (framesPerReveal * 3) === 0) revealed[nextUnrevealed] = true;
    }

    requestAnimationFrame(tick);
  }
  tick();
}

// ── Copy success spark burst ─────────────────────────────────
function sparkBurst(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const N = 10;

  for (let i = 0; i < N; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = cx + 'px';
    spark.style.top = cy + 'px';
    spark.style.background = i % 2 === 0 ? 'var(--accent)' : 'var(--accent2)';
    document.body.appendChild(spark);

    const angle = (Math.PI * 2 * i) / N + Math.random() * 0.3;
    const dist = 30 + Math.random() * 26;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    const anim = spark.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
    ], { duration: 500 + Math.random() * 150, easing: 'cubic-bezier(.2,.7,.3,1)', fill: 'forwards' });

    anim.onfinish = () => spark.remove();
  }
}

// ── Cipher wheel ticks ────────────────────────────────────────
(function buildWheelTicks() {
  const outer = document.getElementById('cwTicksOuter');
  const inner = document.getElementById('cwTicksInner');
  if (!outer || !inner) return;
  const cx = 60, cy = 60;

  function addTicks(container, r1, r2, count) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const x1 = cx + r1 * Math.cos(angle);
      const y1 = cy + r1 * Math.sin(angle);
      const x2 = cx + r2 * Math.cos(angle);
      const y2 = cy + r2 * Math.sin(angle);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      container.appendChild(line);
    }
  }
  addTicks(outer, 50, 54, 26);
  addTicks(inner, 32, 36, 13);
})();

// ── Client-side Vigenère mirror (preview only — real op still hits the API) ──
function previewCipher(text, key, mode) {
  const cleanKey = key.toLowerCase().replace(/[^a-z]/g, '');
  if (!cleanKey) return '';
  let result = '', keyIndex = 0;
  for (const char of text) {
    const lower = char.toLowerCase();
    const pos = ALPHA.indexOf(lower);
    if (pos === -1) { result += char; continue; }
    const shift = ALPHA.indexOf(cleanKey[keyIndex % cleanKey.length]);
    const newPos = mode === 'encrypt'
      ? (pos + shift) % 26
      : (pos - shift + 26) % 26;
    const newChar = ALPHA[newPos];
    result += char === char.toUpperCase() ? newChar.toUpperCase() : newChar;
    keyIndex++;
  }
  return result;
}

function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

const updateLivePreview = debounce(function () {
  const chip = document.getElementById('livePreview');
  const out  = document.getElementById('livePreviewText');
  if (!chip || !out) return;

  const text = document.getElementById('inputText').value;
  const key  = document.getElementById('keyInput').value;

  chip.classList.toggle('decrypt-mode', currentMode === 'decrypt');

  if (!text.trim() || !key.trim()) {
    chip.classList.remove('active');
    out.textContent = 'start typing…';
    return;
  }

  const preview = previewCipher(text.slice(0, 60), key, currentMode);
  chip.classList.add('active');
  out.textContent = preview + (text.length > 60 ? '…' : '');
}, 120);

// ── Custom cursor blob ────────────────────────────────────────
(function initCursorBlob() {
  const blob = document.getElementById('cursorBlob');
  if (!blob) return;
  const isTouch = window.matchMedia('(hover: none), (pointer: coarse)').matches;
  if (isTouch) return;

  let raf = null, tx = 0, ty = 0, cx = 0, cy = 0;

  window.addEventListener('mousemove', e => {
    tx = e.clientX; ty = e.clientY;
    blob.classList.add('visible');
    if (!raf) raf = requestAnimationFrame(render);
  });
  window.addEventListener('mouseleave', () => blob.classList.remove('visible'));

  function render() {
    cx += (tx - cx) * 0.18;
    cy += (ty - cy) * 0.18;
    blob.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
    if (Math.abs(tx - cx) > 0.4 || Math.abs(ty - cy) > 0.4) {
      raf = requestAnimationFrame(render);
    } else {
      raf = null;
    }
  }

  const growSelectors = 'button, input, textarea, a, .history-item, .alpha-cell';
  document.addEventListener('mouseover', e => {
    if (e.target.closest && e.target.closest(growSelectors)) blob.classList.add('grow');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest && e.target.closest(growSelectors)) blob.classList.remove('grow');
  });
})();

// ── Init ───────────────────────────────────────────────────
loadHistory();
</script>
</body>
</html>
